version: '3.8'

services:
  truthforge:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: truthforge-ai
    ports:
      - "3000:3000"
      - "5173:5173"
    environment:
      - NODE_ENV=production
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - TRUTHFORGE_DB_PATH=/data/truthforge.db
      - PORT=3000
      - LOG_LEVEL=info
    volumes:
      - truthforge-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - truthforge-network

volumes:
  truthforge-data:
    driver: local

networks:
  truthforge-network:
    driver: bridge
